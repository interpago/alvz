name: Tests

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main, master]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest requests wasmtime ruff
      - name: Lint with ruff
        run: |
          ruff check alvz/ tests/
      - name: Run tests
        run: |
          python -m pytest tests/ -v --tb=short

  benchmark:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest requests wasmtime
      - name: Run benchmarks
        run: |
          python -m pytest tests/ --benchmark-sort=time --benchmark-columns=min,max,mean -q 2>&1 || echo "Benchmarks completed (no --benchmark flag detected, skipping measurement)"
