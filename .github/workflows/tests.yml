name: Tests

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main, master]

env:
  PYTHONUTF8: "1"

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov requests wasmtime ruff
      - name: Lint with ruff
        run: |
          ruff check alvz/ tests/
          ruff format --check alvz/ tests/
      - name: Run tests with coverage
        run: |
          python -m pytest tests/ -v --tb=short --cov=alvz --cov-report=term-missing --cov-fail-under=60

  benchmark:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests wasmtime
      - name: Run benchmarks
        run: |
          python -m alvz.core.benchmarks
